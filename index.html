<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para meu amor</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-page: #050505;
            --box-bg: rgba(15, 15, 15, 0.40);
            --text-color: #ffffff;
            --main-accent: #d4d4d4;
            --main-light: #ffffff;
            --alt-accent: #a3a3a3;
            --bg-dots: #1f1f1f;
        }

        body {
            background-color: var(--bg-page); 
            background-image: radial-gradient(var(--bg-dots) 2.5px, transparent 2.5px), radial-gradient(var(--bg-dots) 2.5px, transparent 2.5px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: var(--text-color);
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* VÍDEO DE FUNDO */
        .bg-video {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            transform: translateX(-50%) translateY(-50%);
            object-fit: cover;
            opacity: 0.40;
        }

        .bg-color {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-page);
            z-index: -3;
        }

        /* OVERLAY DE CLIQUE (Para liberar áudio) */
        .start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--main-accent);
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.8s ease;
        }

        /* CAIXA DE TEXTO CENTRAL */
        .container {
            width: 90%;
            max-width: 700px;
            background-color: var(--box-bg);
            padding: 50px;
            border-radius: 30px; 
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(12px);
            text-align: center;
            z-index: 10;
        }

        /* Borda animada em cima da caixa */
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 8px;
            background: linear-gradient(90deg, #ffffff, #8a8a8a, #d4d4d4, #ffffff);
            background-size: 200% 200%;
            animation: gradientMove 4s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .text-content h2 {
            font-size: 2.2em;
            color: var(--main-light);
            margin-top: 0;
            margin-bottom: 20px;
        }

        .text-content p {
            font-size: 1.2em;
            line-height: 1.6;
            color: var(--main-accent);
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div id="start-overlay" class="start-overlay">
    <span>Clique para descobrir</span>
</div>

<div id="main-content">
    <div class="bg-color"></div>

    <video autoplay loop muted playsinline id="bg-video" class="bg-video">
        <source src="https://files.catbox.moe/unv3h8.mp4" type="video/mp4">
    </video>

    <audio id="bg-music" loop>
        <source src="https://files.catbox.moe/unv3h8.mp4" type="audio/mpeg">
    </audio>

    <div class="container">
        <div class="text-content">
            <h2>Miau </h2>
            <p>Feliz aniversario meu fofo, 23 aninhos</p>
            <p></p>
            <p>Espero que seu dia seja muito especial! te amo muito!!</p>
        </div>
    </div>
</div>

<script>
    // Lógica do clique para revelar o texto e tocar a música
    document.getElementById('start-overlay').addEventListener('click', function() {
        // Esmaece a tela preta inicial
        this.style.opacity = '0';
        
        setTimeout(() => { 
            this.style.display = 'none'; 
        }, 800);

        // Inicia a música
        const music = document.getElementById('bg-music');
        music.volume = 0.5; // Ajuste o volume se precisar (0.0 a 1.0)
        music.play();
    });
</script>

</body>
</html>
