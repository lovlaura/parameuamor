<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para meu amor</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-page: #050505;
            --box-bg: rgba(15, 15, 15, 0.40);
            --text-color: #ffffff;
            --main-accent: #d4d4d4;
            --main-light: #ffffff;
            --alt-accent: #a3a3a3;
            --bg-dots: #1f1f1f;
        }

        body {
            background-color: var(--bg-page); 
            background-image: radial-gradient(var(--bg-dots) 2.5px, transparent 2.5px), radial-gradient(var(--bg-dots) 2.5px, transparent 2.5px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: var(--text-color);
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* VÍDEO DE FUNDO */
        .bg-video {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            transform: translateX(-50%) translateY(-50%);
            object-fit: cover;
            opacity: 0.40;
        }

        .bg-color {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-page);
            z-index: -3;
        }

        /* OVERLAY DE CLIQUE */
        .start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--main-accent);
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.8s ease;
        }

        .start-overlay span {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* CAIXA DE TEXTO CENTRAL */
        .container {
            width: 90%;
            max-width: 700px;
            background-color: var(--box-bg);
            padding: 50px;
            border-radius: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px); 
            text-align: center;
            z-index: 10;
            
            opacity: 0;
            transform: translateY(30px);
        }

        .container.show {
            animation: slideUpFade 1.2s ease forwards 0.3s;
        }

        @keyframes slideUpFade {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 6px;
            background: linear-gradient(90deg, #ffffff, #8a8a8a, #d4d4d4, #ffffff);
            background-size: 200% 200%;
            animation: gradientMove 4s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .text-content h2 {
            font-size: 2.2em;
            color: var(--main-light);
            margin-top: 0;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5); 
        }

        .text-content p {
            font-size: 1.2em;
            line-height: 1.6;
            color: var(--main-accent);
            margin-bottom: 15px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        @media (max-width: 600px) {
            .container {
                padding: 35px 25px;
            }
            .text-content h2 {
                font-size: 1.8em;
            }
            .text-content p {
                font-size: 1.1em;
            }
        }

        /* --- CSS ADICIONADO PARA O CONTADOR --- */
        .hidden { display: none !important; }

        .wait-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(10px);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .wait-screen h1 {
            font-size: 2.5em;
            color: var(--main-light);
            margin-bottom: 10px;
        }

        .wait-screen p {
            color: var(--alt-accent);
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        #countdown {
            font-size: 3em;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--main-accent);
            background: var(--box-bg);
            padding: 20px 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

<div id="wait-screen" class="wait-screen">
    <h1></h1>
    <p></p>
    <div id="countdown">Carregando...</div>
</div>

<div id="start-overlay" class="start-overlay hidden">
    <span>Clique para descobrir</span>
</div>

<div id="main-content" class="hidden">
    <div class="bg-color"></div>

    <video autoplay loop muted playsinline id="bg-video" class="bg-video">
        <source src="https://files.catbox.moe/unv3h8.mp4" type="video/mp4">
    </video>

    <div class="container" id="message-box">
        <div class="text-content">
            <h2>Miau ❤️</h2>
            <p>Feliz aniversário meu fofo, 23 aninhos!</p>
            <p>Muitos aninhos de vida pra vc, quero que viva bastante pra eu te aproveitar muito rs</p>
            <p>Espero que seu dia seja muito especial! Te amo muito!!</p>
        </div>
    </div>
</div>

<script>
    // --- LÓGICA DO CONTADOR ADICIONADA ---
    const targetDate = new Date('April 29, 2026 00:00:00').getTime();
    const waitScreen = document.getElementById('wait-screen');
    const startOverlayWrapper = document.getElementById('start-overlay');
    const mainContentWrapper = document.getElementById('main-content');
    const countdownElement = document.getElementById('countdown');

    const interval = setInterval(function() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        if (distance <= 0) {
            clearInterval(interval);
            // Libera o site quando chegar a data
            waitScreen.classList.add('hidden');
            startOverlayWrapper.classList.remove('hidden');
            mainContentWrapper.classList.remove('hidden');
        } else {
            // Atualiza os números
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const format = (num) => num < 10 ? '0' + num : num;
            countdownElement.innerHTML = `${format(days)}d ${format(hours)}h ${format(minutes)}m ${format(seconds)}s`;
        }
    }, 1000);

    // --- SEU SCRIPT ORIGINAL INTACTO ---
    document.getElementById('start-overlay').addEventListener('click', function() {
        const overlay = this;
        const video = document.getElementById('bg-video');
        const messageBox = document.getElementById('message-box');

        // 1. Esmaece a tela preta inicial
        overlay.style.opacity = '0';
        
        // 2. Remove da tela e mostra o texto depois de 800ms
        setTimeout(() => { 
            overlay.style.display = 'none'; 
            messageBox.classList.add('show');
        }, 800);

        // 3. Força o vídeo a dar play COM SOM com segurança
        if (video) {
            video.muted = false; // Tira o mudo
            video.volume = 0.5;  // Ajusta o volume (0.0 a 1.0)
            
            // Força o play() caso o navegador tenha pausado o autoplay
            let playPromise = video.play();
            
            // Evita erros no console se o navegador for muito restrito
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Navegador bloqueou o áudio automático:", error);
                });
            }
        }
    });
</script>

</body>
</html>
